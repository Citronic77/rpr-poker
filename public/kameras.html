<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamera-Aufnahmen — UNIQUE</title>
<style>
:root{--navy:#0d1e3d;--gold:#f5a623;--bg:#f0ede8;--card:#fff;--border:#e0ddd8;--text:#0d1e3d;--text2:#6b7280;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--navy);padding:14px 1.25rem;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:20px;font-weight:900;color:#fff;letter-spacing:.15em}
.hdr-sub{font-size:10px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
.back-btn{background:rgba(255,255,255,.15);border:none;border-radius:6px;color:#fff;padding:6px 14px;font-size:13px;font-weight:600;text-decoration:none;display:inline-block}
.page{max-width:700px;margin:0 auto;padding:1.5rem 1rem 3rem}
.filters{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.fg label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2)}
.fg select,.fg input{border:1.5px solid var(--border);border-radius:6px;padding:8px 10px;font-size:14px;color:var(--text);background:#fff;outline:none;width:100%}
.fg select:focus,.fg input:focus{border-color:var(--gold)}
.btn-search{align-self:flex-end;padding:9px 20px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 1rem;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.rec-cam{width:38px;height:38px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rec-info{flex:1}
.rec-name{font-size:14px;font-weight:600}
.rec-time{font-size:12px;color:var(--text2);margin-top:2px}
.btn-play{padding:7px 16px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn-play:hover{background:#0f6e56}
.empty{text-align:center;padding:3rem;color:var(--text2);font-size:14px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.err{background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:1rem;color:var(--red);font-size:13px;margin-bottom:1rem}
.cs-ok{font-size:12px;padding:4px 10px;border-radius:99px;font-weight:500;background:#f0fdf4;color:var(--green);border:1px solid #86efac}
.cs-err{font-size:12px;padding:4px 10px;border-radius:99px;font-weight:500;background:#fef2f2;color:var(--red);border:1px solid #fca5a5}
.info{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:1rem;line-height:1.6}
.pw{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:1rem}
.pw.open{display:flex}
.pi{background:#000;border-radius:12px;overflow:hidden;width:100%;max-width:800px}
.ph{background:#111;padding:10px 1rem;display:flex;align-items:center;justify-content:space-between}
.ph-title{color:#fff;font-size:14px;font-weight:600}
.ph-close{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer}
.ph-dl{padding:5px 12px;background:var(--gold);color:var(--navy);border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none}
video{width:100%;max-height:70vh;display:block}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center;gap:12px">
    <a href="javascript:history.back()" class="back-btn">← Zurück</a>
    <div><div class="hdr-logo">UNIQUE</div><div class="hdr-sub">Kamera-Aufnahmen</div></div>
  </div>
  <div id="cs"></div>
</div>

<div class="page">
  <div class="info" id="certInfo" style="display:none">
    ⚠️ Zuerst das Zertifikat akzeptieren:
    <a href="https://rpr-poker.synology.me:5002" target="_blank" style="color:#92400e;font-weight:700">https://rpr-poker.synology.me:5002 öffnen →</a>
    dann hier nochmal verbinden.
  </div>

  <div class="filters">
    <div class="fg">
      <label>Kamera</label>
      <select id="cam"><option value="">— Alle Kameras —</option></select>
    </div>
    <div class="fg">
      <label>Datum</label>
      <input type="date" id="dt">
    </div>
    <button class="btn-search" onclick="search()">🔍 Suchen</button>
  </div>

  <div id="msg"></div>
  <div id="res"></div>
</div>

<div class="pw" id="pw">
  <div class="pi">
    <div class="ph">
      <span class="ph-title" id="pt">Aufnahme</span>
      <div style="display:flex;align-items:center;gap:10px">
        <a id="pdl" href="#" class="ph-dl" target="_blank">⬇ Download</a>
        <button class="ph-close" onclick="closeP()">✕</button>
      </div>
    </div>
    <video id="vid" controls></video>
  </div>
</div>

<script>
const BASE = 'https://rpr-poker.synology.me:5002';
const USER = 'pokerappuser';
const PASS = 'RpRCamera99++';
let sid = null;

document.getElementById('dt').value = new Date().toISOString().split('T')[0];

async function login() {
  document.getElementById('cs').innerHTML = '<span style="font-size:12px;color:#9ca3af">🔄 Verbinde...</span>';
  try {
    const r = await fetch(`${BASE}/webapi/auth.cgi?api=SYNO.API.Auth&version=3&method=login&account=${encodeURIComponent(USER)}&passwd=${encodeURIComponent(PASS)}&session=SurveillanceStation&format=sid`);
    const d = await r.json();
    if (!d.success) {
      document.getElementById('cs').innerHTML = '<span class="cs-err">✕ Login fehlgeschlagen</span>';
      setMsg(`<div class="err">⚠️ Login fehlgeschlagen (Code ${d.error?.code})</div>`);
      return;
    }
    sid = d.data.sid;
    document.getElementById('cs').innerHTML = '<span class="cs-ok">✓ Verbunden</span>';
    document.getElementById('certInfo').style.display = 'none';
    await loadCams();
  } catch(e) {
    document.getElementById('cs').innerHTML = '<span class="cs-err">✕ Getrennt</span>';
    document.getElementById('certInfo').style.display = 'block';
    setMsg(`<div class="err">⚠️ Verbindung fehlgeschlagen. Bitte zuerst das Zertifikat akzeptieren (Link oben).</div>`);
  }
}

async function loadCams() {
  try {
    const r = await fetch(`${BASE}/webapi/entry.cgi?api=SYNO.SurveillanceStation.Camera&version=9&method=List&_sid=${sid}`);
    const d = await r.json();
    if (!d.success) return;
    const s = document.getElementById('cam');
    s.innerHTML = '<option value="">— Alle Kameras —</option>'
      + d.data.cameras.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  } catch(e) {}
}

async function search() {
  const camId = document.getElementById('cam').value;
  const date = document.getElementById('dt').value;
  setMsg('<div style="padding:1rem;text-align:center;color:var(--text2)">🔄 Lade Aufnahmen...</div>');
  document.getElementById('res').innerHTML = '';

  if (!sid) { await login(); if (!sid) return; }

  try {
    const d = new Date(date); d.setHours(0,0,0,0);
    const from = Math.floor(d.getTime()/1000), to = from + 86400;
    let qs = `api=SYNO.SurveillanceStation.Recording&version=5&method=List&fromTime=${from}&toTime=${to}&offset=0&limit=100&_sid=${sid}`;
    if (camId) qs += `&cameraIds=${camId}`;
    const r = await fetch(`${BASE}/webapi/entry.cgi?${qs}`);
    const data = await r.json();
    setMsg('');
    if (!data.success) { setMsg(`<div class="err">⚠️ Fehler ${data.error?.code}</div>`); return; }
    const recs = data.data?.recordings || [];
    if (!recs.length) { document.getElementById('res').innerHTML = '<div class="empty">📭 Keine Aufnahmen gefunden.</div>'; return; }
    document.getElementById('res').innerHTML = recs.map(r => {
      const s = new Date(r.startTime*1000), e = new Date(r.stopTime*1000);
      const dur = Math.round((r.stopTime - r.startTime)/60);
      return `<div class="rec-card">
        <div class="rec-cam">${icon(r.cameraName)}</div>
        <div class="rec-info">
          <div class="rec-name">${r.cameraName || 'Kamera'}</div>
          <div class="rec-time">${t(s)} – ${t(e)} · ${dur} Min</div>
        </div>
        <button class="btn-play" onclick="play(${r.id},'${esc(r.cameraName)}','${t(s)}')">▶ Abspielen</button>
      </div>`;
    }).join('');
  } catch(e) {
    setMsg(`<div class="err">⚠️ ${e.message}</div>`);
  }
}

function play(id, cam, time) {
  document.getElementById('pt').textContent = cam + ' · ' + time;
  const url = `${BASE}/webapi/entry.cgi?api=SYNO.SurveillanceStation.Recording&version=5&method=Download&id=${id}&_sid=${sid}`;
  document.getElementById('vid').src = url;
  document.getElementById('pdl').href = url;
  document.getElementById('pw').classList.add('open');
  document.getElementById('vid').play().catch(()=>{});
}

function closeP() {
  document.getElementById('vid').pause();
  document.getElementById('vid').src = '';
  document.getElementById('pw').classList.remove('open');
}

function setMsg(h) { document.getElementById('msg').innerHTML = h; }
function t(d) { return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function icon(n) { if (!n) return '📹'; const l=n.toLowerCase(); if(l.includes('final')) return '🏆'; if(l.includes('kasse')) return '💰'; return '📹'; }
function esc(s) { return (s||'').replace(/'/g, "\\'"); }

document.getElementById('pw').addEventListener('click', e => { if(e.target===document.getElementById('pw')) closeP(); });
window.addEventListener('load', () => login());
</script>
</body>
</html>
