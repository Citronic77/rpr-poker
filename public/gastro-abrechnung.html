<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;background:#f0ede8;margin:0;padding:20px">
  <div style="max-width:560px;margin:0 auto">
    <div style="background:#0d1e3d;padding:18px 24px;border-radius:6px 6px 0 0">
      <span style="font-size:22px;font-weight:900;color:#fff;letter-spacing:3px">UNIQUE</span>
      <span style="font-size:11px;color:#f5a623;margin-left:10px;letter-spacing:2px;text-transform:uppercase">Poker &amp; Sport Lounge</span>
    </div>
    <div style="background:#fff;padding:24px;border:1px solid #e8e6e0;border-top:none;border-radius:0 0 6px 6px">
      <h2 style="color:#0d1e3d;margin:0 0 8px;font-size:16px">Gastro-Abrechnung</h2>
      <p style="color:#4a5568;font-size:13px;margin:0 0 16px">
        Datum: <strong>{{datum}}</strong> &nbsp;|&nbsp; Verantwortlich: <strong>{{verantw}}</strong>
      </p>
      <pre style="background:#f8f7f4;border:1px solid #e8e6e0;border-radius:4px;padding:16px;font-size:13px;line-height:1.7;color:#2d3748;white-space:pre-wrap;font-family:monospace">{{summary}}</pre>
      <div style="margin-top:24px;text-align:center">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td align="center">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="background:#0d1e3d;border-radius:4px;padding:14px 32px;">
                    <a href="{{pdf_url}}" target="_blank" style="color:#f5a623;text-decoration:none;font-weight:700;font-size:14px;letter-spacing:.05em;display:inline-block">&#128196; PDF herunterladen</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </div>
      <p style="font-size:12px;color:#718096;margin-top:16px;text-align:center">Der Link ist für 30 Tage gültig.</p>
    </div>
    <p style="font-size:11px;color:#a0aec0;text-align:center;margin-top:12px">
      Bonnstrasse 22, 3186 Düdingen &nbsp;·&nbsp; poker@rpr.duedingen.ch
    </p>
  </div>
</body>
</html>
