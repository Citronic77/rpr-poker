<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPR Staff Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--bg2:#111318;--bg3:#1a1d24;--border:#2a2e38;--text:#f0ede8;--text2:#8b909e;--gold:#d4af35;--green:#1D9E75;--red:#e05252;--navy:#0d1e3d;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--navy);padding:12px 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(212,175,53,.2)}
.hdr-logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:.15em}
.hdr-sub{font-size:10px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase}
.hdr-user{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:10px}
.hdr-user b{color:var(--text)}
button.logout{background:rgba(255,255,255,.1);border:none;border-radius:var(--r);color:#fff;padding:5px 12px;font-size:12px;cursor:pointer}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 1.5rem}
.tab{padding:14px 20px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.page{max-width:960px;margin:0 auto;padding:1.5rem 1rem 4rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
input,select{padding:10px 12px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:'Barlow',sans-serif;outline:none}
input:focus,select:focus{border-color:var(--gold)}
.btn{padding:10px 20px;border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;cursor:pointer}
.btn-gold{background:var(--gold);color:#0a0c10}
.btn-red{background:#3a1a1a;color:var(--red);border:1px solid var(--red);font-size:12px;padding:5px 10px}
.btn-green{background:var(--green);color:#fff;font-size:12px;padding:6px 12px}
.event-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:1rem;overflow:hidden}
.event-hdr{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.event-name{font-size:17px;font-weight:700}
.event-meta{font-size:12px;color:var(--text2);margin-top:2px}
.event-body{padding:1rem 1.25rem;border-top:1px solid var(--border)}
.shift-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.shift-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:.75rem}
.shift-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between;margin-bottom:.5rem}
.slot{font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--text2)}
.slot:last-child{border-bottom:none}
.slot.filled{color:var(--text)}
.slot-empty{font-style:italic;color:#6b7280}
.rmv{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px}
.signup-btn{width:100%;margin-top:.5rem;padding:7px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer}
.signup-btn:disabled{opacity:.4;cursor:not-allowed}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.badge-open{background:#1a3a20;color:#4ade80}
.badge-closed{background:#3a1a1a;color:#f87171}
.jc-fl{color:#a78bfa}.jc-de{color:var(--gold)}.jc-ga{color:#38bdf8}.jc-ku{color:#fb923c}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
th{color:var(--text2);font-size:11px;text-transform:uppercase;background:var(--bg3)}
.empty{text-align:center;padding:3rem;color:var(--text2)}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-logo">RPR</div><div class="hdr-sub">Staff Planung</div></div>
  <div class="hdr-user">Angemeldet als <b id="hdr-name"></b>
    <button class="logout" id="btn-logout">Abmelden</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" id="tab-events-btn">Anlaesse</div>
  <div class="tab" id="tab-admin-btn" style="display:none">Verwaltung</div>
</div>
<div class="page">
  <div id="page-events">
    <div class="card" id="create-form" style="display:none">
      <div class="card-title">Neuer Anlass</div>
      <div class="form-grid">
        <div class="fg"><label>Name / Turnier</label><input id="ev-name" placeholder="z.B. RPR Pokerturnier"></div>
        <div class="fg"><label>Datum</label><input type="date" id="ev-datum"></div>
        <div class="fg"><label>Uhrzeit</label><input type="time" id="ev-uhrzeit" value="18:00"></div>
        <div style="grid-column:1/-1;display:flex;flex-direction:column;gap:8px">
          <div class="fg"><label>Floorman</label><div style="display:flex;gap:8px"><input type="number" id="ev-floor" value="1" min="0" max="5" style="width:70px;flex-shrink:0"><input id="ev-floor-note" placeholder="Bemerkung..." style="flex:1"></div></div>
          <div class="fg"><label>Dealer</label><div style="display:flex;gap:8px"><input type="number" id="ev-dealer" value="4" min="0" max="20" style="width:70px;flex-shrink:0"><input id="ev-dealer-note" placeholder="Bemerkung..." style="flex:1"></div></div>
          <div class="fg"><label>Gastro</label><div style="display:flex;gap:8px"><input type="number" id="ev-gastro" value="2" min="0" max="10" style="width:70px;flex-shrink:0"><input id="ev-gastro-note" placeholder="Bemerkung..." style="flex:1"></div></div>
          <div class="fg"><label>Kueche</label><div style="display:flex;gap:8px"><input type="number" id="ev-kueche" value="1" min="0" max="5" style="width:70px;flex-shrink:0"><input id="ev-kueche-note" placeholder="Bemerkung..." style="flex:1"></div></div>
        </div>
      </div>
      <button class="btn btn-gold" id="btn-create-event">Anlass erstellen</button>
    </div>
    <div id="events-list"><div class="empty">Lade Anlaesse...</div></div>
  </div>
  <div id="page-admin" style="display:none">
    <div class="card">
      <div class="card-title">Neuer Mitarbeiter</div>
      <div class="form-grid">
        <div class="fg"><label>Name</label><input id="u-name" placeholder="Vorname Nachname"></div>
        <div class="fg"><label>E-Mail</label><input type="email" id="u-email"></div>
        <div class="fg"><label>Passwort</label><input type="password" id="u-pass"></div>
        <div class="fg"><label>Funktionen</label>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
            <label style="text-transform:none;letter-spacing:0;font-size:13px;display:flex;align-items:center;gap:8px"><input type="checkbox" id="u-job-fl" value="floorman"> Floorman</label>
            <label style="text-transform:none;letter-spacing:0;font-size:13px;display:flex;align-items:center;gap:8px"><input type="checkbox" id="u-job-de" value="dealer" checked> Dealer</label>
            <label style="text-transform:none;letter-spacing:0;font-size:13px;display:flex;align-items:center;gap:8px"><input type="checkbox" id="u-job-ga" value="gastro"> Gastro</label>
            <label style="text-transform:none;letter-spacing:0;font-size:13px;display:flex;align-items:center;gap:8px"><input type="checkbox" id="u-job-ku" value="kueche"> Kueche</label>
          </div>
        </div>
        <div class="fg"><label>Rolle</label>
          <select id="u-role">
            <option value="staff" selected>Mitarbeiter</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <button class="btn btn-gold" id="btn-create-user">Mitarbeiter erstellen</button>
    </div>
    <div class="card-title" style="margin-top:1rem">Alle Mitarbeiter</div>
    <div class="card" style="padding:0">
      <table><thead><tr><th>Name</th><th>E-Mail</th><th>Funktion</th><th>Rolle</th><th></th></tr></thead>
      <tbody id="users-body"></tbody></table>
    </div>
  </div>
</div>

<script>
const JL = {floorman:'Floorman',dealer:'Dealer',gastro:'Gastro',kueche:'Kueche'};
const JC = {floorman:'jc-fl',dealer:'jc-de',gastro:'jc-ga',kueche:'jc-ku'};
let token = '', user = null;

function api(method, path, body) {
  return fetch(path, {
    method,
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
    body: body ? JSON.stringify(body) : undefined
  }).then(r => r.json());
}

function showTab(t) {
  document.getElementById('page-events').style.display = t==='events' ? 'block' : 'none';
  document.getElementById('page-admin').style.display = t==='admin' ? 'block' : 'none';
  document.getElementById('tab-events-btn').classList.toggle('active', t==='events');
  document.getElementById('tab-admin-btn').classList.toggle('active', t==='admin');
  if (t==='admin') loadUsers();
}

async function loadEvents() {
  const cont = document.getElementById('events-list');
  try {
    const events = await api('GET','/api/events');
    if (!Array.isArray(events)) {
      cont.innerHTML = '<div class="empty">Fehler: '+JSON.stringify(events)+'</div>';
      return;
    }
    if (!events.length) { cont.innerHTML = '<div class="empty">Noch keine Anlaesse.</div>'; return; }
    const cards = await Promise.all(events.map((ev, idx) => renderEvent(ev, idx)));
    cont.innerHTML = cards.join('');
  } catch(e) {
    cont.innerHTML = '<div class="empty">Fehler beim Laden: '+e.message+'</div>';
  }
}

async function renderEvent(ev, idx) {
  const shifts = await api('GET', '/api/events/'+ev.id+'/shifts');
  const d = new Date(ev.datum+'T12:00:00').toLocaleDateString('de-CH',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const isAdmin = user.role==='admin';
  const userShift = shifts.find(s=>s.user_id===user.id);
  const isPast = new Date(ev.datum) < new Date(new Date().toDateString());
  const jobs = ['floorman','dealer','gastro','kueche'];
  let boxes = '';
  for (const job of jobs) {
    const needed = ev[job+'_needed'];
    if (!needed) continue;
    const js = shifts.filter(s=>s.job===job);
    const full = js.length>=needed;
    const userJobs = user.jobs || [user.job] || [];
    const canSign = ev.status==='open' && !isPast && !userShift && !full && (isAdmin || userJobs.includes(job));
    const note = ev[job+'_note']||'';
    boxes += '<div class="shift-box"><div class="shift-title"><span class="'+JC[job]+'">'+ JL[job]+(note?' <span style="color:var(--text2);font-weight:400;font-size:10px;text-transform:none;letter-spacing:0">('+note+')</span>':'')+'</span><span style="color:var(--text2)">'+js.length+'/'+needed+'</span></div>';
    for (let i=0;i<needed;i++) {
      const s=js[i];
      if (s) boxes += '<div class="slot filled"><span>'+s.name+'</span>'+((isAdmin||s.user_id===user.id)&&ev.status==='open'&&!isPast?'<button class="rmv" data-eid="'+ev.id+'" data-sid="'+s.id+'">x</button>':'')+'</div>';
      else boxes += '<div class="slot"><span class="slot-empty">frei</span></div>';
    }
    if (canSign) boxes += '<button class="signup-btn" data-eid="'+ev.id+'" data-job="'+job+'">+ Eintragen</button>';
    boxes += '</div>';
  }
  const adminBtns = isAdmin ? '<button class="btn btn-red" data-edit="'+ev.id+'" data-ev="'+encodeURIComponent(JSON.stringify(ev))+'">Bearbeiten</button> <button class="btn btn-red" data-del="'+ev.id+'">Loeschen</button> <button class="btn btn-red" data-tog="'+ev.id+'" data-status="'+ev.status+'" style="'+(ev.status!=='open'?'color:#4ade80;border-color:#4ade80':'')+'">'+( ev.status==='open'?'Schliessen':'Oeffnen')+'</button>' : '';
  const altBg = idx % 2 === 1 ? 'background:#161a22' : '';
  return '<div class="event-card" style="'+altBg+'"><div class="event-hdr"><div><div class="event-name">'+ev.name+'</div><div class="event-meta">'+d+' - '+ev.uhrzeit+' Uhr</div></div><div class="flex"><span class="badge badge-'+(ev.status==='open'?'open':'closed')+'">'+(ev.status==='open'?'Offen':'Geschlossen')+'</span>'+adminBtns+'</div></div><div class="event-body"><div class="shift-grid">'+boxes+'</div></div></div>';
}


async function loadUsers() {
  const users = await api('GET','/api/users');
  if (!Array.isArray(users)) { document.getElementById('users-body').innerHTML='<tr><td colspan="5" class="empty">Fehler beim Laden</td></tr>'; return; }
  document.getElementById('users-body').innerHTML = users.map(u => {
    const jobList = Array.isArray(u.jobs) ? u.jobs : (u.job ? [u.job] : ['?']);
    const jobHtml = jobList.map(j=>'<span class="'+(JC[j]||'')+'">'+(JL[j]||j)+'</span>').join(' ');
    return '<tr><td>'+u.name+'</td><td>'+u.email+'</td><td>'+jobHtml+'</td><td>'+(u.role==='admin'?'Admin':'Mitarbeiter')+'</td><td>'+'<button class="btn" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);font-size:12px;padding:4px 10px;margin-right:4px" data-edit-user="'+u.id+'" data-edit-name="'+u.name+'" data-edit-email="'+u.email+'" data-edit-role="'+u.role+'" data-edit-jobs="'+(u.jobs||[]).join(',')+'">Bearbeiten</button>'+(u.role!=='admin'?'<button class="btn btn-red" data-del-user="'+u.id+'">Loeschen</button>':'')+'</td></tr>';
  }).join('') || '<tr><td colspan="5" class="empty">Keine Mitarbeiter</td></tr>';
}

// Event delegation
document.addEventListener('click', async function(e) {
  const t = e.target;

  if (t.id==='btn-logout') { localStorage.clear(); location.href='/login.html'; }

  if (t.id==='tab-events-btn') showTab('events');
  if (t.id==='tab-admin-btn') showTab('admin');

  if (t.id==='btn-create-event') {
    const name = document.getElementById('ev-name').value.trim();
    const datum = document.getElementById('ev-datum').value;
    const uhrzeit = document.getElementById('ev-uhrzeit').value;
    if (!name) { alert('Bitte Turniername eingeben'); return; }
    if (!datum) { alert('Bitte Datum waehlen'); return; }
    const body = { name, datum, uhrzeit,
      floorman_needed: parseInt(document.getElementById('ev-floor').value)||1,
      dealer_needed: parseInt(document.getElementById('ev-dealer').value)||4,
      gastro_needed: parseInt(document.getElementById('ev-gastro').value)||2,
      kueche_needed: parseInt(document.getElementById('ev-kueche').value)||1,
      floorman_note: document.getElementById('ev-floor-note').value.trim(),
      dealer_note: document.getElementById('ev-dealer-note').value.trim(),
      gastro_note: document.getElementById('ev-gastro-note').value.trim(),
      kueche_note: document.getElementById('ev-kueche-note').value.trim()
    };
    const res = await api('POST','/api/events',body);
    if (res.id) { document.getElementById('ev-name').value=''; loadEvents(); }
    else alert(res.error||'Fehler');
  }

  if (t.id==='btn-create-user') {
    const name=document.getElementById('u-name').value.trim();
    const email=document.getElementById('u-email').value.trim();
    const password=document.getElementById('u-pass').value;
    if (!name||!email||!password) { alert('Alle Felder ausfullen'); return; }
    const jobs = ['floorman','dealer','gastro','kueche']
      .filter(j => document.getElementById('u-job-'+j.substring(0,2)).checked);
    if (!jobs.length) { alert('Bitte mindestens eine Funktion waehlen'); return; }
    const res = await api('POST','/api/users',{name,email,password,jobs,role:document.getElementById('u-role').value});
    if (res.id) { document.getElementById('u-name').value=''; document.getElementById('u-email').value=''; document.getElementById('u-pass').value=''; loadUsers(); }
    else alert(res.error||'Fehler');
  }

  if (t.dataset.del) {
    if (!confirm('Anlass loeschen?')) return;
    await api('DELETE','/api/events/'+t.dataset.del);
    loadEvents();
  }

  if (t.dataset.tog) {
    const ev = { status: t.dataset.status==='open' ? 'closed' : 'open' };
    await api('PATCH','/api/events/'+t.dataset.tog, ev);
    loadEvents();
  }

  if (t.dataset.edit) {
    const ev = JSON.parse(decodeURIComponent(t.dataset.ev));
    document.getElementById('edit-name').value = ev.name;
    document.getElementById('edit-datum').value = ev.datum;
    document.getElementById('edit-uhrzeit').value = ev.uhrzeit;
    document.getElementById('edit-floor').value = ev.floorman_needed;
    document.getElementById('edit-floor-note').value = ev.floorman_note||'';
    document.getElementById('edit-dealer').value = ev.dealer_needed;
    document.getElementById('edit-dealer-note').value = ev.dealer_note||'';
    document.getElementById('edit-gastro').value = ev.gastro_needed;
    document.getElementById('edit-gastro-note').value = ev.gastro_note||'';
    document.getElementById('edit-kueche').value = ev.kueche_needed;
    document.getElementById('edit-kueche-note').value = ev.kueche_note||'';
    document.getElementById('edit-modal').style.display = 'flex';
    document.getElementById('edit-modal').dataset.eid = t.dataset.edit;
    document.getElementById('edit-modal').dataset.status = ev.status;
  }

  if (t.id==='btn-cancel-edit') {
    document.getElementById('edit-modal').style.display = 'none';
  }

  if (t.id==='btn-save-edit') {
    const eid = document.getElementById('edit-modal').dataset.eid;
    const status = document.getElementById('edit-modal').dataset.status;
    const body = {
      name: document.getElementById('edit-name').value.trim(),
      datum: document.getElementById('edit-datum').value,
      uhrzeit: document.getElementById('edit-uhrzeit').value,
      floorman_needed: parseInt(document.getElementById('edit-floor').value)||0,
      dealer_needed: parseInt(document.getElementById('edit-dealer').value)||0,
      gastro_needed: parseInt(document.getElementById('edit-gastro').value)||0,
      kueche_needed: parseInt(document.getElementById('edit-kueche').value)||0,
      floorman_note: document.getElementById('edit-floor-note').value.trim(),
      dealer_note: document.getElementById('edit-dealer-note').value.trim(),
      gastro_note: document.getElementById('edit-gastro-note').value.trim(),
      kueche_note: document.getElementById('edit-kueche-note').value.trim(),
      status
    };
    if (!body.name || !body.datum) { alert('Name und Datum benoetigt'); return; }
    await api('PATCH', '/api/events/'+eid, body);
    document.getElementById('edit-modal').style.display = 'none';
    loadEvents();
  }

  if (t.dataset.sid) {
    if (!confirm('Einteilung entfernen?')) return;
    await api('DELETE','/api/events/'+t.dataset.eid+'/shifts/'+t.dataset.sid);
    loadEvents();
  }

  if (t.dataset.job) {
    const eid = t.dataset.eid;
    const job = t.dataset.job;
    if (user.role === 'admin') {
      // Admin: show staff selection modal
      document.getElementById('sm-job').textContent = job;
      document.getElementById('sm-list').innerHTML = '<div style="color:var(--text2)">Lade Mitarbeiter...</div>';
      document.getElementById('staff-modal').style.display = 'flex';
      document.getElementById('staff-modal').dataset.eid = eid;
      document.getElementById('staff-modal').dataset.job = job;
      // Load available staff for this job
      const [users, shifts] = await Promise.all([
        api('GET','/api/users'),
        api('GET','/api/events/'+eid+'/shifts')
      ]);
      const assignedIds = shifts.map(s=>s.user_id);
      const available = users.filter(u =>
        u.role !== 'admin' &&
        !assignedIds.includes(u.id) &&
        (u.jobs||[]).includes(job)
      );
      if (!available.length) {
        document.getElementById('sm-list').innerHTML = '<div style="color:var(--text2);text-align:center;padding:1rem">Keine verfuegbaren Mitarbeiter fuer diese Funktion</div>';
      } else {
        document.getElementById('sm-list').innerHTML = available.map(u =>
          '<button class="btn" style="width:100%;text-align:left;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;padding:10px 14px;border-radius:var(--r);color:#fff;font-size:15px;font-weight:400" data-assign-user="'+u.id+'" data-assign-name="'+u.name+'">'
          +'<b>'+u.name+'</b>'
          +'</button>'
        ).join('');
      }
    } else {
      const res = await api('POST','/api/events/'+eid+'/shifts',{job});
      if (res.id) loadEvents();
      else alert(res.error||'Fehler');
    }
  }

  if (t.dataset.assignUser) {
    const eid = document.getElementById('staff-modal').dataset.eid;
    const job = document.getElementById('staff-modal').dataset.job;
    const userId = t.dataset.assignUser;
    const res = await api('POST','/api/events/'+eid+'/shifts',{job, userId});
    document.getElementById('staff-modal').style.display = 'none';
    if (res.id) loadEvents();
    else alert(res.error||'Fehler');
  }

  if (t.id==='sm-cancel') {
    document.getElementById('staff-modal').style.display = 'none';
  }

  if (t.dataset.editUser) {
    const uid = t.dataset.editUser;
    document.getElementById('ue-name').value = t.dataset.editName;
    document.getElementById('ue-email').value = t.dataset.editEmail;
    document.getElementById('ue-role').value = t.dataset.editRole;
    document.getElementById('ue-pass').value = '';
    const jobs = (t.dataset.editJobs||'').split(',').filter(Boolean);
    ['fl','de','ga','ku'].forEach(k => {
      const map = {fl:'floorman',de:'dealer',ga:'gastro',ku:'kueche'};
      document.getElementById('ue-job-'+k).checked = jobs.includes(map[k]);
    });
    document.getElementById('user-edit-modal').dataset.uid = uid;
    document.getElementById('user-edit-modal').style.display = 'flex';
  }

  if (t.id==='ue-cancel') {
    document.getElementById('user-edit-modal').style.display = 'none';
  }

  if (t.id==='ue-save') {
    const uid = document.getElementById('user-edit-modal').dataset.uid;
    const jobs = ['floorman','dealer','gastro','kueche'].filter(j =>
      document.getElementById('ue-job-'+j.substring(0,2)).checked
    );
    if (!jobs.length) { alert('Bitte mindestens eine Funktion waehlen'); return; }
    const body = {
      name: document.getElementById('ue-name').value.trim(),
      email: document.getElementById('ue-email').value.trim(),
      jobs,
      role: document.getElementById('ue-role').value
    };
    const pass = document.getElementById('ue-pass').value;
    if (pass) body.password = pass;
    const res = await api('PATCH', '/api/users/'+uid, body);
    if (res.ok) { document.getElementById('user-edit-modal').style.display='none'; loadUsers(); }
    else alert(res.error||'Fehler');
  }

  if (t.dataset.delUser) {
    if (!confirm('Mitarbeiter loeschen?')) return;
    await api('DELETE','/api/users/'+t.dataset.delUser);
    loadUsers();
  }
});

// Init
token = localStorage.getItem('sp_token');
const userData = localStorage.getItem('sp_user');
if (!token || !userData) { location.href='/login.html'; }
else {
  user = JSON.parse(userData);
  document.getElementById('hdr-name').textContent = user.name;
  if (user.role==='admin') {
    document.getElementById('tab-admin-btn').style.display='block';
    document.getElementById('create-form').style.display='block';
    document.getElementById('ev-datum').value = new Date().toISOString().split('T')[0];
  }
  loadEvents();
}
</script>
